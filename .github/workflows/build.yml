name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'go.work'
      - 'go.work.sum'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'go.work'
      - 'go.work.sum'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64,                ext: ''     }
          - { goos: linux,   goarch: arm64,                ext: ''     }
          - { goos: linux,   goarch: 386,                  ext: ''     }
          - { goos: linux,   goarch: arm,     goarm: '7',  ext: ''     }
          - { goos: linux,   goarch: mips64,               ext: ''     }
          - { goos: linux,   goarch: mips64le,             ext: ''     }
          - { goos: darwin,  goarch: amd64,                ext: ''     }
          - { goos: darwin,  goarch: arm64,                ext: ''     }
          - { goos: windows, goarch: amd64,                ext: '.exe' }
          - { goos: windows, goarch: arm64,                ext: '.exe' }
          - { goos: freebsd, goarch: amd64,                ext: ''     }
    env:
      GOOS:   ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM:  ${{ matrix.goarm }}
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server + client (raw binaries, named per-target)
        run: |
          set -euo pipefail
          mkdir -p dist
          suffix="${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}"
          ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }}"
          go build -trimpath -ldflags="$ldflags" -o "dist/snell-server-${suffix}${{ matrix.ext }}" ./cmd/snell-server
          go build -trimpath -ldflags="$ldflags" -o "dist/snell-client-${suffix}${{ matrix.ext }}" ./cmd/snell-client
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: opensnell-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: go vet ./...
      - run: go test -race ./...

  release:
    name: Release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/snell-server-*
            artifacts/snell-client-*
          generate_release_notes: true
          fail_on_unmatched_files: true
